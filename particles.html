<script>
(function() {
    try {
        var doc = window.parent.document;

        // Respect reduced-motion preference: skip the effect entirely
        if (window.parent.matchMedia &&
            window.parent.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            return;
        }

        // Guard against re-injection on every Streamlit rerun, but remove any
        // stale canvas first so styling changes actually take effect.
        var existing = doc.getElementById('bio-particle-canvas');
        if (existing) existing.remove();

        var canvas = doc.createElement('canvas');
        canvas.id = 'bio-particle-canvas';
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '0';
        // Full opacity now — individual particle alpha controls brightness instead
        canvas.style.opacity = '1';
        canvas.style.mixBlendMode = 'screen';
        doc.body.appendChild(canvas);

        var ctx = canvas.getContext('2d');
        var pWindow = window.parent;

        function resize() {
            canvas.width = pWindow.innerWidth;
            canvas.height = pWindow.innerHeight;
        }
        resize();
        pWindow.addEventListener('resize', resize);

        var colors = ['#06B6D4', '#8B5CF6', '#10B981', '#F59E0B'];
        var COUNT = 70; // more motes on screen

        var particles = [];

        function makeParticle(spawnAnywhere) {
            return {
                x: Math.random() * canvas.width,
                y: spawnAnywhere ? Math.random() * canvas.height : canvas.height + 20,
                r: Math.random() * 3.2 + 1.8,          // bigger core radius
                speedY: Math.random() * 0.5 + 0.18,
                driftPhase: Math.random() * Math.PI * 2,
                driftSpeed: Math.random() * 0.015 + 0.004,
                driftAmp: Math.random() * 0.6 + 0.25,
                color: colors[Math.floor(Math.random() * colors.length)],
                alpha: Math.random() * 0.35 + 0.65,     // much brighter baseline
                pulsePhase: Math.random() * Math.PI * 2,
                pulseSpeed: Math.random() * 0.03 + 0.015
            };
        }

        for (var i = 0; i < COUNT; i++) {
            particles.push(makeParticle(true));
        }

        var running = true;
        function tick() {
            if (!running) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (var j = 0; j < particles.length; j++) {
                var p = particles[j];
                p.driftPhase += p.driftSpeed;
                p.pulsePhase += p.pulseSpeed;
                p.y -= p.speedY;
                p.x += Math.sin(p.driftPhase) * p.driftAmp;

                if (p.y < -15) {
                    particles[j] = makeParticle(false);
                    continue;
                }
                if (p.x < -15) p.x = canvas.width + 15;
                if (p.x > canvas.width + 15) p.x = -15;

                var pulse = 0.75 + 0.25 * Math.sin(p.pulsePhase);

                // Outer soft glow halo, drawn first so the bright core sits on top
                var haloR = p.r * (5 + 3 * pulse);
                var haloGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, haloR);
                haloGrad.addColorStop(0, hexToRgba(p.color, 0.55 * p.alpha * pulse));
                haloGrad.addColorStop(1, hexToRgba(p.color, 0));
                ctx.beginPath();
                ctx.fillStyle = haloGrad;
                ctx.arc(p.x, p.y, haloR, 0, Math.PI * 2);
                ctx.fill();

                // Bright core with extra shadow blur for a strong glow
                ctx.beginPath();
                ctx.globalAlpha = Math.min(1, p.alpha * pulse * 1.15);
                ctx.shadowBlur = 18 * pulse;
                ctx.shadowColor = p.color;
                ctx.fillStyle = '#FFFFFF';
                ctx.arc(p.x, p.y, p.r * 0.45, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.globalAlpha = p.alpha * pulse;
                ctx.shadowBlur = 14 * pulse;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            requestAnimationFrame(tick);
        }

        function hexToRgba(hex, alpha) {
            var h = hex.replace('#', '');
            var r = parseInt(h.substring(0, 2), 16);
            var g = parseInt(h.substring(2, 4), 16);
            var b = parseInt(h.substring(4, 6), 16);
            return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
        }

        tick();

        // Clean up if this component iframe is ever removed (rare, but tidy)
        window.addEventListener('unload', function() {
            running = false;
        });
    } catch (e) {
        // Fail silently — the effect is purely decorative
        console.warn('Ambient particle effect skipped:', e);
    }
})();
</script>
